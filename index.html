<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail d'Organisation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .login-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            margin: 50px auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-card h2 {
            color: #667eea;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
        }
        
        .portal {
            display: none;
        }
        
        .portal.active {
            display: block;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .org-logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .org-details h1 {
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .org-details p {
            color: #666;
        }
        
        .user-info {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .stat-card h3 {
            color: #667eea;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }
        
        .projects-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .section-title {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 24px;
        }
        
        .project-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        
        .project-card h4 {
            color: #333;
            margin-bottom: 5px;
        }
        
        .project-card p {
            color: #666;
            font-size: 14px;
        }
        
        .status {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status.active {
            background: #d4edda;
            color: #155724;
        }
        
        .status.en_cours {
            background: #fff3cd;
            color: #856404;
        }
        
        .logout-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .logout-btn:hover {
            background: #c82333;
        }
        
        .error {
            color: #dc3545;
            background: #f8d7da;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Page de connexion -->
        <div class="login-card" id="loginCard">
            <h2>🔒 Portail d'Organisation</h2>
            
            <div class="error" id="error"></div>
            
            <div class="form-group">
                <label for="code">Code d'accès:</label>
                <input type="text" id="code" placeholder="Entrez votre code (ex: 3074973)">
            </div>
            
            <button class="login-btn" onclick="login()">Se connecter</button>
        </div>
        
        <!-- Portail -->
        <div class="portal" id="portal">
            <div class="header">
                <div class="header-info">
                    <img src="" alt="Logo" class="org-logo" id="orgLogo">
                    <div class="org-details">
                        <h1 id="orgName">Nom de l'organisation</h1>
                        <p id="orgDescription">Description de l'organisation</p>
                    </div>
                </div>
                
                <div class="user-info">
                    <h3>👤 Utilisateur connecté</h3>
                    <p id="userName">Nom</p>
                    <p id="userEmail">email@example.com</p>
                    <p id="userRole">Rôle</p>
                </div>
                
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>👥 Utilisateurs</h3>
                    <div class="value" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <h3>📊 Projets</h3>
                    <div class="value" id="totalProjects">0</div>
                </div>
                <div class="stat-card">
                    <h3>🏢 Organisations</h3>
                    <div class="value" id="totalOrgs">0</div>
                </div>
            </div>
            
            <div class="projects-section">
                <h3 class="section-title">📋 Projets de l'organisation</h3>
                <div id="projectsList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://nexoraprodesk.fromhelix409.workers.dev/api/login';
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        async function login() {
            const code = document.getElementById('code').value.trim();
            const errorDiv = document.getElementById('error');
            
            errorDiv.style.display = 'none';
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ code })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Stocker les informations dans localStorage
                    localStorage.setItem('user', JSON.stringify({
                        ...data.user,
                        code: code
                    }));
                    localStorage.setItem('organization', JSON.stringify(data.organization));
                    localStorage.setItem('projects', JSON.stringify(data.projects));
                    
                    // Afficher le portail
                    showPortal(data);
                } else {
                    showError(data.error || 'Code invalide');
                }
            } catch (error) {
                showError('Erreur de connexion');
                console.error(error);
            }
        }
        
        function showPortal(data) {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('portal').classList.add('active');
            
            // Informations organisation
            document.getElementById('orgName').textContent = data.organization.name;
            document.getElementById('orgDescription').textContent = data.organization.description;
            document.getElementById('orgLogo').src = data.organization.logo_url || 'https://via.placeholder.com/150';
            
            // Informations utilisateur
            document.getElementById('userName').textContent = data.user.name;
            document.getElementById('userEmail').textContent = data.user.email;
            document.getElementById('userRole').textContent = `${data.user.role} - ${data.user.department}`;
            
            // Statistiques
            document.getElementById('totalUsers').textContent = data.stats.users;
            document.getElementById('totalProjects').textContent = data.stats.projects;
            document.getElementById('totalOrgs').textContent = data.stats.organizations;
            
            // Projets
            const projectsList = document.getElementById('projectsList');
            projectsList.innerHTML = data.projects.map(project => `
                <div class="project-card">
                    <h4>${project.name}</h4>
                    <p>${project.description}</p>
                    <span class="status ${project.status}">${project.status}</span>
                </div>
            `).join('');
        }
        
        function logout() {
            localStorage.removeItem('user');
            localStorage.removeItem('organization');
            localStorage.removeItem('projects');
            
            document.getElementById('portal').classList.remove('active');
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('code').value = '';
        }
        
        // Vérifier si l'utilisateur est déjà connecté
        window.onload = function() {
            const user = localStorage.getItem('user');
            if (user) {
                const userData = JSON.parse(user);
                // Charger les données depuis l'API
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: userData.code })
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        showPortal(data);
                    }
                });
            }
        };
        
        // Permettre la connexion avec Entrée
        document.getElementById('code').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
