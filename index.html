<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #f6821f;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e56a15;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 4px;
            display: none;
        }
        .error {
            color: red;
            margin-bottom: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <h2>Connexion</h2>
    
    <div id="error" class="error"></div>
    
    <div class="form-group">
        <label for="code">Code d'accès:</label>
        <input type="text" id="code" placeholder="Entrez votre code (ex: 3074973)">
    </div>
    
    <button onclick="login()">Se connecter</button>
    
    <div id="info" class="info">
        <h3>Informations</h3>
        <p><strong>Nom:</strong> <span id="name"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>Code:</strong> <span id="displayCode"></span></p>
        <p><strong>Date:</strong> <span id="date"></span></p>
    </div>

    <script>
        // Mapping des codes
        const users = {
            '3074973': {
                name: 'Jean Dupont',
                email: 'jean.dupont@example.com',
                role: 'Administrateur',
                department: 'IT'
            },
            '1234567': {
                name: 'Marie Martin',
                email: 'marie.martin@example.com',
                role: 'Utilisateur',
                department: 'RH'
            },
            '9876543': {
                name: 'Pierre Bernard',
                email: 'pierre.bernard@example.com',
                role: 'Utilisateur',
                department: 'Marketing'
            }
        };

        function login() {
            const code = document.getElementById('code').value;
            const errorDiv = document.getElementById('error');
            const infoDiv = document.getElementById('info');
            
            errorDiv.style.display = 'none';
            infoDiv.style.display = 'none';
            
            if (users[code]) {
                const user = users[code];
                document.getElementById('name').textContent = user.name;
                document.getElementById('email').textContent = user.email;
                document.getElementById('displayCode').textContent = code;
                document.getElementById('date').textContent = new Date().toLocaleDateString('fr-FR');
                infoDiv.style.display = 'block';
            } else {
                errorDiv.textContent = 'Code invalide. Veuillez réessayer.';
                errorDiv.style.display = 'block';
            }
        }

        // Permettre la connexion avec Entrée
        document.getElementById('code').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
</html>
